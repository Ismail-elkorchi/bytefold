name: Anomaly Sentinel

on:
  schedule:
    - cron: "41 3 * * 2"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: anomaly-sentinel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-idempotence:
    name: Scheduled check + churn gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm
      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: 2.6.7
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.3
      - name: Install
        run: npm ci
      - name: Run one-command truth
        run: npm run check
      - name: Verify tracked files are unchanged
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain=v1)" ]]; then
            echo "Tracked files changed during scheduled check:"
            git status --porcelain=v1
            exit 1
          fi
