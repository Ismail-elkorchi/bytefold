name: OSV-Scanner PR Scan

on:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

permissions:
  actions: read
  contents: read

concurrency:
  group: osv-scanner-pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-pr:
    name: OSV dependency delta
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
    with:
      fail-on-vuln: true
      upload-sarif: true
