name: OSV-Scanner PR Scan

on:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

permissions:
  actions: read
  contents: read

concurrency:
  group: osv-scanner-pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-pr:
    name: OSV dependency delta
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@c5996e0193a3df57d695c1b8a1dec2a4c62e8730 # v2.3.3
    with:
      fail-on-vuln: true
      upload-sarif: true
