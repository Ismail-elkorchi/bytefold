name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Load runtime policy
        id: runtime-policy
        run: |
          node -e "const fs=require('node:fs');const p=JSON.parse(fs.readFileSync('tools/runtime-versions.json','utf8'));process.stdout.write(`node_pinned=${p.node.pinned}\n`);process.stdout.write(`deno_pinned=${p.deno.pinned}\n`);process.stdout.write(`bun_pinned=${p.bun.pinned}\n`);" >> \"$GITHUB_OUTPUT\"
      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ steps.runtime-policy.outputs.node_pinned }}
          registry-url: https://registry.npmjs.org
          always-auth: true
          cache: npm
      - name: Setup Deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ steps.runtime-policy.outputs.deno_pinned }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version: ${{ steps.runtime-policy.outputs.bun_pinned }}
      - name: Install
        run: npm ci
      - name: Quality gates
        run: npm run check
      - name: Fail on tracked-file churn
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain=v1)" ]]; then
            echo "Tracked files changed during CI run:"
            git status --porcelain=v1
            exit 1
          fi
      - name: Publish to npm
        run: npm publish --provenance --access public

  jsr:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Load runtime policy
        id: runtime-policy
        run: |
          node -e "const fs=require('node:fs');const p=JSON.parse(fs.readFileSync('tools/runtime-versions.json','utf8'));process.stdout.write(`node_pinned=${p.node.pinned}\n`);process.stdout.write(`deno_pinned=${p.deno.pinned}\n`);" >> \"$GITHUB_OUTPUT\"
      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ steps.runtime-policy.outputs.node_pinned }}
          cache: npm
      - name: Setup Deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: ${{ steps.runtime-policy.outputs.deno_pinned }}
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Publish to JSR
        env:
          JSR_TOKEN: ${{ secrets.JSR_TOKEN }}
        run: |
          if [ -n "${JSR_TOKEN}" ]; then
            deno publish --token "${JSR_TOKEN}"
          else
            deno publish
          fi
