name: OSV-Scanner Scheduled Scan

on:
  push:
    branches:
      - main
  schedule:
    - cron: "29 3 * * 4"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: osv-scanner-scheduled-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-scheduled:
    name: OSV full dependency scan
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@c5996e0193a3df57d695c1b8a1dec2a4c62e8730 # v2.3.3
    with:
      fail-on-vuln: true
      upload-sarif: true
