name: OSV-Scanner Scheduled Scan

on:
  push:
    branches:
      - main
  schedule:
    - cron: "29 3 * * 4"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: osv-scanner-scheduled-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-scheduled:
    name: OSV full dependency scan
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
    with:
      fail-on-vuln: true
      upload-sarif: true
